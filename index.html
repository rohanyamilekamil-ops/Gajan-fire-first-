<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GAJAN FIRE 3D - BATTLEFIELD</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; border: 2px solid #e74c3c; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid lime; border-radius: 50%; transform: translate(-50%, -50%); }
        .controls { position: absolute; bottom: 20px; left: 20px; color: #aaa; font-size: 12px; }
    </style>
</head>
<body>

    <div id="ui">
        <h2 style="margin:0; color:#e74c3c;">GAJAN FIRE 3D</h2>
        <p>Tokens: <span id="token-count">0</span> GT</p>
        <p>Health: <span id="health">100%</span></p>
    </div>

    <div id="crosshair"></div>

    <div class="controls">
        WASD to Move | Mouse to Aim | Click to Shoot (Gajan Power)
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // 1. Setup 3D Scene
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // Sky Blue
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Add Ground (Battlefield)
        const floorGeo = new THREE.PlaneGeometry(100, 100);
        const floorMat = new THREE.MeshPhongMaterial({ color: 0x228b22 }); // Green Grass
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // 3. Add Lights
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 7.5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // 4. Target Enemy (Red Cube)
        const enemyGeo = new THREE.BoxGeometry(2, 2, 2);
        const enemyMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
        const enemy = new THREE.Mesh(enemyGeo, enemyMat);
        enemy.position.set(0, 1, -10);
        scene.add(enemy);

        // 5. Player Controls Logic
        camera.position.y = 1.6; // Human height
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;

        document.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW') moveForward = true;
            if(e.code === 'KeyS') moveBackward = true;
            if(e.code === 'KeyA') moveLeft = true;
            if(e.code === 'KeyD') moveRight = true;
        });

        document.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW') moveForward = false;
            if(e.code === 'KeyS') moveBackward = false;
            if(e.code === 'KeyA') moveLeft = false;
            if(e.code === 'KeyD') moveRight = false;
        });

        // Mouse Aim (Simplified)
        document.addEventListener('mousemove', (e) => {
            camera.rotation.y -= e.movementX * 0.002;
        });

        // Shooting Logic
        window.addEventListener('mousedown', () => {
            console.log("Gajan Fire Shot!");
            // Hit detection logic (Simplified)
            enemy.material.color.set(0xffff00);
            setTimeout(() => enemy.material.color.set(0xff0000), 100);
        });

        // 6. Animation Loop
        function animate() {
            requestAnimationFrame(animate);

            if(moveForward) camera.translateZ(-0.1);
            if(moveBackward) camera.translateZ(0.1);
            if(moveLeft) camera.translateX(-0.1);
            if(moveRight) camera.translateX(0.1);

            renderer.render(scene, camera);
        }

        animate();

        // Pointer Lock (Click to play)
        renderer.domElement.onclick = () => renderer.domElement.requestPointerLock();

    </script>
</body>
</html>
